# Kafka Connect DISTRIBUTED worker for the REVERSE (rollback) pipeline:
#   Atlas (source of truth after cutover)  →  self-managed target (fail-back copy)
#
# Run this as a SEPARATE Connect cluster from the forward migration: distinct
# group.id and distinct *.storage.topic names so forward and rollback offsets
# never collide. Start each worker with:
#   bin/connect-distributed.sh config/rollback/connect-distributed.properties

bootstrap.servers=broker1:9092,broker2:9092,broker3:9092

# Separate cluster identity from the forward pipeline.
group.id=mongo-rollback-connect

key.converter=org.apache.kafka.connect.json.JsonConverter
value.converter=org.apache.kafka.connect.json.JsonConverter
key.converter.schemas.enable=false
value.converter.schemas.enable=false

# Separate internal topics (RF>=3, min.insync=2 on broker) so resume tokens survive restarts.
offset.storage.topic=connect-offsets-rollback
offset.storage.replication.factor=3
offset.storage.partitions=25
config.storage.topic=connect-configs-rollback
config.storage.replication.factor=3
status.storage.topic=connect-status-rollback
status.storage.replication.factor=3
status.storage.partitions=5

offset.flush.interval.ms=10000
rest.port=8084
plugin.path=/opt/kafka/plugins

producer.compression.type=zstd
producer.linger.ms=50
producer.batch.size=131072
consumer.max.poll.records=2000

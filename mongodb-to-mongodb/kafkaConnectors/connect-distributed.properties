# Kafka Connect — DISTRIBUTED worker config for the 10-cluster → Atlas migration.
#
# Distributed mode (not standalone) so connector offsets / config / status live in
# durable Kafka topics and survive worker restarts — critical for resuming change
# streams from their resume tokens with no data loss or re-snapshot.
#
# Run 2+ workers with the SAME group.id and the SAME *.storage.topic names to form
# a Connect cluster. Start each worker with:
#   bin/connect-distributed.sh config/connect-distributed.properties

bootstrap.servers=broker1:9092,broker2:9092,broker3:9092

# Cluster identity — all workers in this migration share this group.
group.id=mongo-migration-connect

# Converters — schemaless JSON (matches the rollback playbook so both directions
# share one toolchain). _id and full document are carried in the value.
key.converter=org.apache.kafka.connect.json.JsonConverter
value.converter=org.apache.kafka.connect.json.JsonConverter
key.converter.schemas.enable=false
value.converter.schemas.enable=false

# Internal topics — MUST be replicated for durability (RF>=3, min.insync=2 on broker).
offset.storage.topic=connect-offsets
offset.storage.replication.factor=3
offset.storage.partitions=25
config.storage.topic=connect-configs
config.storage.replication.factor=3
status.storage.topic=connect-status
status.storage.replication.factor=3
status.storage.partitions=5

# Flush cadence for source offsets (resume tokens).
offset.flush.interval.ms=10000

# REST API for submitting/managing connectors.
rest.port=8083

# MongoDB Kafka Connector plugin location.
plugin.path=/opt/kafka/plugins

# Producer/consumer tuning for high throughput (applied to all connectors).
producer.compression.type=zstd
producer.linger.ms=50
producer.batch.size=131072
producer.max.request.size=10485760
consumer.max.poll.records=2000
consumer.fetch.max.bytes=52428800
